<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>个人信息 - 实习筛查工具</title>
<style>
  :root {
    --bg: #f5f6fa; --card: #fff; --text: #2c3e50; --sub: #7f8c8d;
    --accent: #3498db; --green: #27ae60; --red: #e74c3c; --border: #ecf0f1;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif; background: var(--bg); color: var(--text); line-height: 1.6; }
  .navbar { background: linear-gradient(135deg, #2c3e50, #3498db); color: #fff; padding: 0.8rem 2rem; display: flex; gap: 2rem; align-items: center; }
  .navbar a { color: rgba(255,255,255,0.85); text-decoration: none; font-size: 0.9rem; }
  .navbar a:hover, .navbar a.active { color: #fff; font-weight: 600; }
  .container { max-width: 800px; margin: 0 auto; padding: 2rem 1.5rem; }
  .card { background: var(--card); border-radius: 10px; padding: 1.5rem; margin-bottom: 1rem; }
  .card h2 { font-size: 1.1rem; margin-bottom: 1rem; color: var(--accent); }

  .form-group { margin-bottom: 1rem; }
  .form-group label { display: block; font-size: 0.85rem; font-weight: 600; margin-bottom: 0.3rem; color: var(--text); }
  .form-group input, .form-group textarea, .form-group select {
    width: 100%; padding: 0.5rem 0.7rem; border: 1px solid var(--border);
    border-radius: 6px; font-size: 0.9rem; font-family: inherit;
  }
  .form-group textarea { resize: vertical; min-height: 80px; }
  .form-row { display: flex; gap: 1rem; }
  .form-row .form-group { flex: 1; }

  /* Skills editor */
  .skill-row { display: flex; gap: 0.5rem; align-items: center; margin-bottom: 0.4rem; }
  .skill-row input[type="text"] { flex: 1; }
  .skill-row input[type="number"] { width: 60px; }
  .skill-row button { padding: 0.3rem 0.7rem; border: 1px solid var(--border); border-radius: 4px; cursor: pointer; background: var(--bg); }
  .skill-row button.del { color: var(--red); border-color: var(--red); }

  /* Tag editor */
  .tag-list { display: flex; flex-wrap: wrap; gap: 0.4rem; margin-bottom: 0.5rem; }
  .tag { font-size: 0.8rem; padding: 0.2rem 0.6rem; border-radius: 12px; background: #ebf5fb; color: #2980b9; display: flex; align-items: center; gap: 0.3rem; }
  .tag .remove { cursor: pointer; font-weight: 700; color: var(--red); }

  /* Project editor */
  .project-card { background: var(--bg); border-radius: 8px; padding: 1rem; margin-bottom: 0.8rem; position: relative; }
  .project-card .remove-proj { position: absolute; top: 0.5rem; right: 0.5rem; cursor: pointer; color: var(--red); font-weight: 700; }

  .btn { padding: 0.5rem 1.5rem; border: none; border-radius: 6px; font-size: 0.9rem; cursor: pointer; font-weight: 600; }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-primary:hover { opacity: 0.9; }
  .btn-green { background: var(--green); color: #fff; }
  .btn-outline { background: #fff; border: 1px solid var(--accent); color: var(--accent); }

  .toast { position: fixed; top: 1rem; right: 1rem; padding: 0.8rem 1.2rem; border-radius: 8px; color: #fff; font-size: 0.9rem; z-index: 1000; opacity: 0; transition: opacity 0.3s; }
  .toast.show { opacity: 1; }
  .toast-ok { background: var(--green); }
  .toast-err { background: var(--red); }

  .actions { display: flex; gap: 0.5rem; justify-content: flex-end; margin-top: 1rem; padding-top: 1rem; border-top: 1px solid var(--border); }

  .llm-status { font-size: 0.8rem; padding: 0.3rem 0.6rem; border-radius: 12px; display: inline-block; }
  .llm-on { background: #d4efdf; color: #1e8449; }
  .llm-off { background: #fdedec; color: #922b21; }
</style>
</head>
<body>

<nav class="navbar">
  <strong>🔍 实习筛查</strong>
  <a href="/" class="">📊 报告</a>
  <a href="/profile" class="active">📝 个人信息</a>
</nav>

<div class="container">
  <h1 style="margin-bottom: 1rem;">个人档案编辑</h1>

  <!-- 基本信息 -->
  <div class="card">
    <h2>基本信息</h2>
    <div class="form-row">
      <div class="form-group"><label>姓名</label><input id="name" placeholder="你的名字"></div>
      <div class="form-group"><label>学校</label><input id="school" placeholder="西安建筑科技大学"></div>
    </div>
    <div class="form-row">
      <div class="form-group"><label>专业</label><input id="major" placeholder="计算机科学与技术"></div>
      <div class="form-group"><label>学历</label><select id="degree"><option>本科</option><option>硕士</option><option>博士</option></select></div>
    </div>
    <div class="form-group"><label>年级</label><input id="grade" placeholder="研一"></div>
  </div>

  <!-- 自我描述 -->
  <div class="card">
    <h2>自我描述 <span style="font-weight:400;font-size:0.8rem;color:var(--sub);">（大模型会分析提取技能标签）</span></h2>
    <div class="form-group">
      <textarea id="self_intro" rows="5" placeholder="用自然语言描述你自己：学过的技术、做过的项目、感兴趣的领域...&#10;例如：研一在读，主要使用 Python 做后端开发，熟悉 Django 和 Flask 框架。做过校园论坛项目..."></textarea>
    </div>
    <div style="display:flex;gap:0.5rem;">
      <button class="btn btn-outline btn-sm" onclick="llmExtract()" id="btnLLM" disabled>🤖 大模型分析提取技能</button>
      <span id="llmBadge" class="llm-status llm-off">LLM 未配置</span>
    </div>
    <div id="llmResult" style="margin-top:0.5rem;font-size:0.85rem;"></div>
  </div>

  <!-- 技能栈 -->
  <div class="card">
    <h2>技能栈</h2>
    <div id="skillList"></div>
    <button class="btn btn-outline btn-sm" onclick="addSkill()" style="margin-top:0.5rem;">+ 添加技能</button>
  </div>

  <!-- 项目经历 -->
  <div class="card">
    <h2>项目经历</h2>
    <div id="projectList"></div>
    <button class="btn btn-outline btn-sm" onclick="addProject()">+ 添加项目</button>
  </div>

  <!-- 意向城市 & 方向 -->
  <div class="card">
    <h2>意向城市 & 岗位方向</h2>
    <div class="form-group">
      <label>意向城市（逗号分隔）</label>
      <input id="cities" placeholder="西安, 北京, 上海">
    </div>
    <div class="form-group">
      <label>岗位方向</label>
      <div id="directionTags" class="tag-list"></div>
      <input id="directionInput" placeholder="输入后回车添加" onkeydown="if(event.key==='Enter'){addTag('direction');event.preventDefault();}">
    </div>
    <div class="form-group">
      <label>关注的公司（逗号分隔，可选）</label>
      <input id="preferredCompanies" placeholder="字节跳动, 腾讯, 华为">
    </div>
  </div>

  <!-- LLM 配置 -->
  <div class="card">
    <h2>大模型配置 <span style="font-weight:400;font-size:0.8rem;color:var(--sub);">（可选，用于智能匹配增强）</span></h2>
    <div class="form-row">
      <div class="form-group"><label>提供商</label><select id="llmProvider"><option value="deepseek">DeepSeek</option><option value="glm">智谱GLM</option><option value="qwen">通义千问</option><option value="openai">OpenAI</option><option value="custom">自定义</option></select></div>
      <div class="form-group"><label>API 端点</label><input id="llmBase" placeholder="https://api.deepseek.com/v1"></div>
    </div>
    <div class="form-row">
      <div class="form-group"><label>模型</label><input id="llmModel" placeholder="deepseek-chat"></div>
      <div class="form-group"><label>API Key</label><input id="llmKey" type="password" placeholder="sk-..."></div>
    </div>
    <div style="margin-top:0.5rem;">
      <button class="btn btn-outline btn-sm" onclick="llmTest()">🔗 测试连接</button>
      <span id="llmTestResult" style="margin-left:0.5rem;font-size:0.85rem;"></span>
    </div>
  </div>

  <!-- 操作按钮 -->
  <div class="card" style="display: flex; gap: 1rem; justify-content: center;">
    <button class="btn btn-primary" onclick="saveProfile()">💾 保存个人信息</button>
    <button class="btn btn-green" onclick="runScreening()">🚀 立即筛查</button>
  </div>
  <div id="runStatus" style="text-align:center;margin-top:0.5rem;font-size:0.85rem;color:var(--sub);"></div>
</div>

<div id="toast" class="toast"></div>

<script>
// ---- State ----
let skills = {};
let projects = [];
let directions = [];

// ---- Toast ----
function showToast(msg, ok=true) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = `toast toast-${ok?'ok':'err'} show`;
  setTimeout(() => t.classList.remove('show'), 2500);
}

// ---- Load ----
async function loadProfile() {
  try {
    const r = await fetch('/api/profile');
    const d = await r.json();
    // Basic info
    ['name','school','major','degree','grade','self_intro'].forEach(k => {
      const el = document.getElementById(k);
      if (el && d.profile && d.profile[k]) el.value = d.profile[k];
    });
    // Skills
    skills = d.skills || {};
    renderSkills();
    // Projects
    projects = d.profile?.projects || [];
    renderProjects();
    // Cities
    if (d.cities?.length) document.getElementById('cities').value = d.cities.join(', ');
    // Directions
    directions = d.job_directions || [];
    renderDirections();
    // Companies
    if (d.preferred_companies?.length) document.getElementById('preferredCompanies').value = d.preferred_companies.join(', ');
    // LLM
    const llm = d.llm || {};
    if (llm.provider) document.getElementById('llmProvider').value = llm.provider;
    if (llm.api_base) document.getElementById('llmBase').value = llm.api_base;
    if (llm.model) document.getElementById('llmModel').value = llm.model;
    if (llm.api_key && llm.api_key !== '你的API_KEY') document.getElementById('llmKey').value = llm.api_key;

    updateLLMBadge();
  } catch(e) { console.error(e); }
}

function buildProfilePayload() {
  return {
    profile: {
      name: document.getElementById('name').value,
      school: document.getElementById('school').value,
      major: document.getElementById('major').value,
      degree: document.getElementById('degree').value,
      grade: document.getElementById('grade').value,
      self_intro: document.getElementById('self_intro').value,
      projects: projects,
    },
    cities: document.getElementById('cities').value.split(/[,，]/).map(s=>s.trim()).filter(Boolean),
    skills: skills,
    job_directions: directions,
    preferred_companies: document.getElementById('preferredCompanies').value.split(/[,，]/).map(s=>s.trim()).filter(Boolean),
    llm: {
      provider: document.getElementById('llmProvider').value,
      api_base: document.getElementById('llmBase').value,
      model: document.getElementById('llmModel').value,
      api_key: document.getElementById('llmKey').value,
      enabled: !!document.getElementById('llmKey').value,
      temperature: 0.3,
      max_tokens: 2000,
    }
  };
}

// ---- Skills ----
function renderSkills() {
  const el = document.getElementById('skillList');
  el.innerHTML = Object.entries(skills).map(([name, level]) =>
    `<div class="skill-row">
      <input type="text" value="${name}" onchange="updateSkillName('${name}', this.value)" placeholder="技能名">
      <input type="number" value="${level}" min="1" max="5" onchange="updateSkillLevel('${name}', parseInt(this.value))">
      <button class="del" onclick="removeSkill('${name}')">✕</button>
    </div>`
  ).join('');
}
function addSkill() {
  const name = prompt('技能名称：');
  if (name && !skills[name]) { skills[name] = 3; renderSkills(); }
}
function removeSkill(name) { delete skills[name]; renderSkills(); }
function updateSkillName(old, nu) {
  if (nu && old !== nu) { skills[nu] = skills[old]; delete skills[old]; renderSkills(); }
}
function updateSkillLevel(name, lvl) { if (lvl >= 1 && lvl <= 5) skills[name] = lvl; }

// ---- Projects ----
function renderProjects() {
  const el = document.getElementById('projectList');
  el.innerHTML = projects.map((p,i) =>
    `<div class="project-card">
      <span class="remove-proj" onclick="removeProject(${i})">✕</span>
      <div class="form-row">
        <div class="form-group"><label>项目名</label><input value="${p.name||''}" onchange="projects[${i}].name=this.value"></div>
        <div class="form-group"><label>角色</label><input value="${p.role||''}" onchange="projects[${i}].role=this.value"></div>
      </div>
      <div class="form-group"><label>技术栈（逗号分隔）</label><input value="${(p.tech||[]).join(', ')}" onchange="projects[${i}].tech=this.value.split(/[,，]/).map(s=>s.trim()).filter(Boolean)"></div>
      <div class="form-group"><label>描述</label><textarea onchange="projects[${i}].desc=this.value">${p.desc||''}</textarea></div>
    </div>`
  ).join('');
}
function addProject() { projects.push({name:'', role:'', tech:[], desc:''}); renderProjects(); }
function removeProject(i) { projects.splice(i,1); renderProjects(); }

// ---- Directions ----
function renderDirections() {
  const el = document.getElementById('directionTags');
  el.innerHTML = directions.map(d =>
    `<span class="tag">${d} <span class="remove" onclick="removeDirection('${d}')">✕</span></span>`
  ).join('');
}
function addTag() {
  const inp = document.getElementById('directionInput');
  const v = inp.value.trim();
  if (v && !directions.includes(v)) { directions.push(v); renderDirections(); }
  inp.value = '';
}
function removeDirection(d) { directions = directions.filter(x => x !== d); renderDirections(); }

// ---- Save ----
async function saveProfile() {
  try {
    const payload = buildProfilePayload();
    const r = await fetch('/api/profile', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(payload) });
    const d = await r.json();
    showToast(d.message || '保存成功', d.ok);
    updateLLMBadge();
  } catch(e) { showToast('保存失败: ' + e, false); }
}

// ---- Run ----
async function runScreening() {
  await saveProfile();
  document.getElementById('runStatus').textContent = '筛查启动中...';
  try {
    const r = await fetch('/api/run', { method:'POST' });
    const d = await r.json();
    if (d.ok) {
      pollStatus();
    } else {
      document.getElementById('runStatus').textContent = d.message;
    }
  } catch(e) { document.getElementById('runStatus').textContent = '启动失败: ' + e; }
}

function pollStatus() {
  const el = document.getElementById('runStatus');
  const iv = setInterval(async () => {
    try {
      const r = await fetch('/api/status');
      const d = await r.json();
      if (d.running) {
        el.textContent = '筛查进行中...';
      } else if (d.result === 'success') {
        el.innerHTML = `✅ 筛查完成！<a href="/">查看报告</a>`;
        clearInterval(iv);
      } else {
        el.textContent = '❌ 筛查失败: ' + (d.error || '未知错误');
        clearInterval(iv);
      }
    } catch(e) { el.textContent = '状态查询失败'; clearInterval(iv); }
  }, 2000);
}

// ---- LLM ----
function updateLLMBadge() {
  const key = document.getElementById('llmKey').value;
  const badge = document.getElementById('llmBadge');
  const btn = document.getElementById('btnLLM');
  if (key && key !== '你的API_KEY') {
    badge.textContent = 'LLM 已配置';
    badge.className = 'llm-status llm-on';
    btn.disabled = false;
  } else {
    badge.textContent = 'LLM 未配置';
    badge.className = 'llm-status llm-off';
    btn.disabled = true;
  }
}
document.getElementById('llmKey').addEventListener('input', updateLLMBadge);

async function llmTest() {
  const el = document.getElementById('llmTestResult');
  el.textContent = '测试中...';
  try {
    // 先保存配置
    const payload = buildProfilePayload();
    await fetch('/api/profile', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(payload) });

    const r = await fetch('/api/llm/test', { method:'POST' });
    const d = await r.json();
    if (d.ok) {
      el.innerHTML = `✅ 连接成功！模型: ${d.stats.model}, 调用: ${d.stats.call_count}次`;
    } else {
      el.textContent = '❌ ' + (d.message || '连接失败');
    }
  } catch(e) { el.textContent = '❌ 请求失败: ' + e; }
}

async function llmExtract() {
  const el = document.getElementById('llmResult');
  el.textContent = '分析中...';
  try {
    const payload = buildProfilePayload();
    await fetch('/api/profile', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(payload) });

    const r = await fetch('/api/llm/extract', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({
        self_intro: document.getElementById('self_intro').value,
        projects: projects,
      })
    });
    const d = await r.json();
    if (d.ok && d.result) {
      el.innerHTML = `<strong>分析结果：</strong><br>` +
        `水平：${d.result.level || '未知'} | 方向：${(d.result.directions||[]).join(', ')}<br>` +
        `总结：${d.result.summary || ''}<br>` +
        `<button class="btn btn-outline btn-sm" style="margin-top:0.5rem;" onclick="applyLLMSkills(${JSON.stringify(d.result.skills||{}).replace(/"/g,'&quot;')})">✅ 应用提取的技能</button>`;
    } else {
      el.textContent = '分析失败: ' + (d.message || '未知错误');
    }
  } catch(e) { el.textContent = '请求失败: ' + e; }
}

function applyLLMSkills(skillsData) {
  // 将 LLM 提取的技能合并到当前技能栈
  for (const [cat, skillMap] of Object.entries(skillsData)) {
    for (const [name, level] of Object.entries(skillMap)) {
      if (!skills[name] || level > skills[name]) {
        skills[name] = level;
      }
    }
  }
  renderSkills();
  showToast('技能已更新！');
}

// ---- Init ----
loadProfile();
</script>

</body>
</html>
